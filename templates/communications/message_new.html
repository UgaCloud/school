{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block page_title %}New Message{% endblock page_title %}

{% block content %}
<div class="clearfix"></div>

<div class="row">
  <div class="col-md-12 col-sm-12 col-xs-12">
    <div class="x_panel">
      <div class="x_title">
        <h2><i class="fa fa-plus"></i> New Message</h2>
        <ul class="nav navbar-right panel_toolbox">
          <li><a class="collapse-link"><i class="fa fa-chevron-up"></i></a></li>
        </ul>
        <div class="clearfix"></div>
      </div>
      <div class="x_content">
        <form method="post">
          {% csrf_token %}
          {{ form|crispy }}
          <div class="form-group">
            <label for="id_body">Message</label>
            <textarea name="body" id="id_body" rows="4" class="form-control" placeholder="Type your message"></textarea>
          </div>
          <div class="btn-group">
            <button type="submit" class="btn btn-primary"><i class="fa fa-paper-plane"></i> Send</button>
            <a href="{% url 'message_inbox' %}" class="btn btn-default"><i class="fa fa-arrow-left"></i> Back</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock content %}
