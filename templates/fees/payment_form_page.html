{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block page_title %}Record Payment - {{ bill }}{% endblock %}

{% block content %}
<div class="clearfix"></div>

<div class="row">
    <div class="col-md-8 col-md-offset-2">
        <div class="x_panel">
            <div class="x_title">
                <h2><i class="fa fa-money"></i> Record Payment</h2>
                <ul class="nav navbar-right panel_toolbox">
                    <li><a class="collapse-link"><i class="fa fa-chevron-up"></i></a></li>
                    <li><a class="close-link"><i class="fa fa-close"></i></a></li>
                </ul>
                <div class="clearfix"></div>
            </div>
            <div class="x_content">
                <div class="alert alert-info">
                    <strong>Bill:</strong> {{ bill }} - Student: {{ bill.student.student_name }}
                </div>
                
                <form method="post" class="form-horizontal">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="form-group">
                        <div class="col-md-12 text-center">
                            <button type="submit" class="btn btn-success">
                                <i class="fa fa-save"></i> Record Payment
                            </button>
                            <a href="{% url 'student_fees_history' bill.student.id %}" class="btn btn-secondary">
                                <i class="fa fa-arrow-left"></i> Back to History
                            </a>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
